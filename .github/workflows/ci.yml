name: BookingYa CI - All Phases

on:
  push:
    branches: [ "main", "estudiantes" ]
  pull_request:
    branches: [ "main", "estudiantes" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 1. Ejecutamos SOLO TDD (Tests unitarios) primero
      - name: Run TDD (Unit Tests)
        run: mvn test -Dtest=*Test

      # 2. Compilar el JAR omitiendo tests para ir más rápido
      - name: Build Spring Boot App
        run: mvn package -DskipTests

      # 3. Levantar la aplicación en segundo plano
      - name: Start Spring Boot App
        run: |
          java -Dspring.profiles.active=h2 -jar target/*.jar > app_log.txt 2>&1 &

      # 4. Esperar a que la API responda en el puerto 8080
      - name: Wait for API to be ready
        run: npx wait-on tcp:8080 --timeout 180000

      # 5. AHORA ejecutamos los tests de BDD (Cucumber + RestAssured)
      # Usamos verify y filtramos por el Runner de Cucumber
      - name: Run BDD (Cucumber Tests)
        run: mvn test -Dtest=CucumberTestRunner

      # 6. Depuración si algo falla arriba
      - name: Debug App Startup (on failure)
        if: failure()
        run: |
          echo "------- LOG DE LA APLICACIÓN (SPRING BOOT) -------"
          cat app_log.txt || echo "No se encontró el archivo de log"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ATDD Dependencies
        run: |
          cd "playwright- test atdd"
          npm install
          chmod -R +x node_modules/.bin/
          npx playwright install --with-deps chromium

      - name: Run ATDD tests
        run: |
          cd "playwright- test atdd"
          npx playwright test

      # Opcional: Subir logs como artefacto si falló
      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-logs
          path: app_log.txt