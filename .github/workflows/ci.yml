name: BookingYa CI - All Phases

on:
  push:
    branches: [ "main", "estudiantes" ]
  pull_request:
    branches: [ "main", "estudiantes" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven


      - name: Run TDD and BDD tests
        run: mvn clean verify


      - name: Build and Start Spring Boot App
        run: |
          mvn package -DskipTests
          java -jar target/*.jar &
        

      - name: Wait for API to be ready
        run: npx wait-on http://localhost:8080/api/reservations --timeout 60000

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ATDD Dependencies
        run: |
          cd "playwright- test atdd"
          npm install
          npx playwright install --with-deps chromium

      - name: Run ATDD tests
        run: |
          cd "playwright- test atdd"
          npx playwright test