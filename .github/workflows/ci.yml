name: Java CI with Maven

on:
  push:
    branches: [ "main", "estudiantes" ]
  pull_request:
    branches: [ "main", "estudiantes" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: bookingya
          POSTGRES_USER: sa
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Create .env file
        run: |
          echo "HOST_DB=localhost" >> .env
          echo "PORT_DB=5432" >> .env
          echo "POSTGRES_DB=bookingya" >> .env
          echo "USERNAME_DB=sa" >> .env
          echo "PASSWORD_DB=password" >> .env
      
      - name: Run tests
        run: mvn -B test --file pom.xml
