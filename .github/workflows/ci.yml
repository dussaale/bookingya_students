name: Java CI with Maven

on:
  push:
    branches: [ "main", "estudiantes" ]
  pull_request:
    branches: [ "main", "estudiantes" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Create .env file
        run: |
          echo "SPRING_PROFILES_ACTIVE=h2" >> .env

      - name: Run TDD and BDD tests
        run: mvn clean test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          cd "playwright- test atdd"
          npm install
          npx playwright install --with-deps chromium

      - name: Give Playwright permissions
        run: |
          chmod +x "$(find /home/runner/.cache/ms-playwright -name 'chrome' -o -name 'chromium' | head -1)"

      - name: Run ATDD tests
        run: |
          cd "playwright- test atdd"
          npx playwright test
